<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}
.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}
.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}
.question{
  text-align:left;
  font-size:22px;
  white-space:pre-line;
  margin-top:10px;
}

/* FRAME SOAL */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
}

.question-img,
.focus-img{
  max-width:300px;
  border-radius:12px;
  margin:12px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:9999;
  padding:16px;
}
.focusBox{max-width:800px;margin:auto}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
  <h1>🎮 Kuis Matematika</h1>

  <div id="timer" class="timer"></div>
  <div id="questionNumber"></div>

  <div class="question-frame">
    <div id="question" class="question"></div>
    <img id="questionImg" class="question-img">
  </div>

  <div id="options" class="options"></div>

  <button onclick="prevQuestion()">◀ Sebelumnya</button>
  <button onclick="nextQuestion()">▶ Berikutnya</button>
  <button onclick="showFocus()">📘 Pembahasan</button>

  <div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div class="question-frame">
      <div id="focusQuestion" class="question"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{q:"Sebuah koin dilempar, kemudian sebuah dadu dilempar. Berapa peluang muncul gambar dan angka genap?",options:["1/2","1/3","1/4","1/6"],correct:"1/4",p:"Peluang muncul gambar pada koin adalah 1/2. Peluang muncul angka genap pada dadu (2, 4, 6) adalah 3/6 = 1/2. Karena kedua kejadian saling bebas, peluang gabungan adalah 1/2 × 1/2 = 1/4.",img:""},
{q:"Dalam sebuah kantong terdapat 2 bola merah dan 1 bola biru. Jika diambil satu bola, dikembalikan, lalu diambil lagi, berapa peluang terambil dua bola merah?",options:["2/3","4/9","1/3","5/9"],correct:"4/9",p:"Peluang terambil bola merah pada satu pengambilan adalah 2/3. Karena pengambilan dengan pengembalian, kejadian saling bebas. Maka peluang dua bola merah adalah 2/3 × 2/3 = 4/9.",img:""},
{q:"Sebuah spinner memiliki 3 warna: merah, biru, hijau. Spinner diputar dua kali. Berapa peluang muncul dua warna yang sama?",options:["1/3","1/9","1/6","1/4"],correct:"1/3",p:"Peluang muncul dua warna yang sama berarti kedua putaran menghasilkan warna yang identik. Terdapat tiga kemungkinan: merah-merah, biru-biru, dan hijau-hijau. Masing-masing peluangnya adalah 1/3 × 1/3 = 1/9, sehingga total peluang adalah 3 × 1/9 = 1/3. Kunci jawaban pada soal perlu diperbaiki.",img:""},
{q:"Sebuah koin dilempar dua kali. Berapa peluang muncul satu gambar dan satu angka?",options:["1/2","1/4","3/4","2/4"],correct:"1/2",p:"Kemungkinan hasil pelemparan dua koin adalah {G,G}, {G,A}, {A,G}, dan {A,A}. Kejadian satu gambar dan satu angka adalah {G,A} dan {A,G}, berjumlah 2 dari 4 kemungkinan. Maka peluangnya adalah 2/4 = 1/2.",img:""},
{q:"Dalam sebuah kantong terdapat 3 bola merah dan 2 bola biru. Jika diambil dua bola secara acak dengan pengembalian, berapa peluang terambil satu merah dan satu biru?",options:["3/10","6/25","12/25","9/25"],correct:"12/25",p:"Peluang mengambil bola merah adalah 3/5 dan bola biru adalah 2/5. Kejadian satu merah dan satu biru dapat terjadi dalam dua urutan: merah lalu biru atau biru lalu merah. Peluangnya adalah (3/5 × 2/5) + (2/5 × 3/5) = 6/25 + 6/25 = 12/25.",img:""}

];

let currentQuestion=0;
let answered=new Array(questions.length).fill(false);
let benar=0;
let quizSelesai=false;

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* TAMPIL SOAL (✅ SAMA DENGAN CONTOH REGU) */
function showQuestion(){
  let q=questions[currentQuestion];
  questionNumber.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  /* ✅ INI KUNCINYA */
  feedback.textContent = answered[currentQuestion] ? "✔ Sudah terjawab" : "";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  if(ans===questions[currentQuestion].correct){
    btn.classList.add("correct");
    benar++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    feedback.textContent="❌ Salah";
  }

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    let nilai=Math.round((benar/questions.length)*100);
    timer.textContent=`✅ Selesai | Nilai: ${nilai}`;
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#bbb'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){
  focusLayer.style.display="none";
  quiz.style.display="block";
}

/* INIT */
showQuestion();
</script>

</body>
</html>
