<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}
.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}
.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}
.question{
  text-align:left;
  font-size:22px;
  white-space:pre-line;
  margin-top:10px;
}

/* FRAME SOAL */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
}

.question-img,
.focus-img{
  max-width:300px;
  border-radius:12px;
  margin:12px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:9999;
  padding:16px;
}
.focusBox{max-width:800px;margin:auto}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
  <h1>🎮 Kuis Matematika</h1>

  <div id="timer" class="timer"></div>
  <div id="questionNumber"></div>

  <div class="question-frame">
    <div id="question" class="question"></div>
    <img id="questionImg" class="question-img">
  </div>

  <div id="options" class="options"></div>

  <button onclick="prevQuestion()">◀ Sebelumnya</button>
  <button onclick="nextQuestion()">▶ Berikutnya</button>
  <button onclick="showFocus()">📘 Pembahasan</button>

  <div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div class="question-frame">
      <div id="focusQuestion" class="question"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{q:"Sebuah tabung digunakan sebagai wadah tepung. Jika jari-jari tabung 7 cm dan tingginya 20 cm, maka volume tabung tersebut adalah …",options:["2.500π cm³","980π cm³","1.540π cm³","3.080π cm³"],correct:"980π cm³",p:"Volume tabung dihitung dengan rumus V = πr²t. Dengan r = 7 cm dan t = 20 cm diperoleh V = π × 49 × 20 = 980π cm³.",img:""},
{q:"Sebuah pabrik membuat penutup speaker berbentuk bola dengan jari-jari 10 cm. Luas permukaan satu penutup speaker tersebut adalah …",options:["200π cm²","400π cm²","800π cm²","1.200π cm²"],correct:"400π cm²",p:"Luas permukaan bola dihitung dengan rumus L = 4πr². Dengan r = 10 cm diperoleh L = 4π × 100 = 400π cm². Jawaban yang benar adalah 400π cm².",img:""},
{q:"Sebuah corong berbentuk kerucut memiliki tinggi 15 cm dan jari-jari 4 cm. Volume corong tersebut adalah …",options:["80π cm³","100π cm³","160π cm³","240π cm³"],correct:"80π cm³",p:"Volume kerucut dihitung dengan rumus V = 1/3 πr²t. Dengan r = 4 cm dan t = 15 cm diperoleh V = 1/3 × π × 16 × 15 = 80π cm³.",img:""},
{q:"Sebuah tangki air berbentuk tabung memiliki tinggi 1,5 m dan volume 0,942 m³. Jari-jari tangki air tersebut adalah …",options:["0,25 m","0,40 m","0,45 m","0,50 m"],correct:"0,40 m",p:"Gunakan rumus volume tabung V = πr²t. Diketahui 0,942 = π × r² × 1,5 sehingga r² = 0,942 / (1,5π) ≈ 0,20 dan r ≈ 0,40 m.",img:""},
{q:"Sebuah bola hias dengan jari-jari 12 cm akan dicat seluruh permukaannya. Banyaknya luas permukaan yang harus dicat adalah …",options:["288π cm²","576π cm²","864π cm²","1.152π cm²"],correct:"576π cm²",p:"Luas permukaan bola dihitung dengan rumus L = 4πr². Dengan r = 12 cm diperoleh L = 4π × 144 = 576π cm².",img:""},
{q:"Perhatikan pernyataan berikut:\n1) Bentuk kerucut memudahkan aliran fluida.\n2) Bola memiliki distribusi tekanan merata.\n3) Tabung tidak dapat digunakan sebagai wadah cairan.\n4) Tabung efisien untuk penyimpanan.\nPernyataan yang benar adalah …",options:["1, 2, dan 3","1, 2, dan 4","1 dan 3","2 dan 4"],correct:"1, 2, dan 4",p:"Pernyataan benar adalah (1) kerucut memudahkan aliran fluida, (2) bola memiliki distribusi tekanan merata, dan (4) tabung efisien sebagai wadah penyimpanan. Pernyataan (3) salah karena tabung justru sering digunakan sebagai wadah cairan.",img:""}

];

let currentQuestion=0;
let answered=new Array(questions.length).fill(false);
let benar=0;
let quizSelesai=false;

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* TAMPIL SOAL (✅ SAMA DENGAN CONTOH REGU) */
function showQuestion(){
  let q=questions[currentQuestion];
  questionNumber.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  /* ✅ INI KUNCINYA */
  feedback.textContent = answered[currentQuestion] ? "✔ Sudah terjawab" : "";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  if(ans===questions[currentQuestion].correct){
    btn.classList.add("correct");
    benar++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    feedback.textContent="❌ Salah";
  }

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    let nilai=Math.round((benar/questions.length)*100);
    timer.textContent=`✅ Selesai | Nilai: ${nilai}`;
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#bbb'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){
  focusLayer.style.display="none";
  quiz.style.display="block";
}

/* INIT */
showQuestion();
</script>

</body>
</html>
